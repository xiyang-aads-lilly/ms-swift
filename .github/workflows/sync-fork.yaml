name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:       # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote and sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/modelscope/ms-swift.git
          git fetch upstream
          git checkout main
          if git merge-base --is-ancestor HEAD upstream/main; then
            # Local is behind or equal — fast-forward is safe
            git merge upstream/main --ff-only
            git push origin main
          else
            # Local has diverged — rebase then force-push
            echo "Diverged from upstream, rebasing..."
            git rebase upstream/main
            git push origin main --force-with-lease
          fi
